name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Build, lint and smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Smoke tests
        run: npm run smoke
        env:
          CROSS_REVIEW_V2_STUB: "1"
          # v2.4.0 / P1.1 fail-fast: stub activation requires explicit
          # confirmation. The smoke harness is a legitimate stub consumer.
          CROSS_REVIEW_V2_STUB_CONFIRMED: "1"
