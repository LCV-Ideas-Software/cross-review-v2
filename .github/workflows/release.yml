name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/ref to release, for example v02.00.01"
        required: false
        default: ""

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish packages and create release
    runs-on: ubuntu-latest
    environment: npm-production
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js 24 for npmjs
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@lcv-ideas-software"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify
        run: npm test
        env:
          CROSS_REVIEW_V2_STUB: "1"

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          DISPLAY_TAG="$(echo "${VERSION%%-*}" | awk -F. '{ printf "v%02d.%02d.%02d", $1, $2, $3 }')"
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ]; then
            TAG="$DISPLAY_TAG"
          fi
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
          else
            DIST_TAG="latest"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "display_tag=$DISPLAY_TAG" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          if [ -n "$TAG" ]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create artifact directory
        run: mkdir -p ./artifacts

      - name: Pack artifact
        run: npm pack --pack-destination ./artifacts

      - name: Check npmjs.com package version
        id: npmjs-version
        if: steps.meta.outputs.is_release == 'true'
        run: |
          if npm view "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }} already exists on npmjs.com; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }} is not published on npmjs.com yet."
          fi

      - name: Publish to npmjs.com
        if: steps.meta.outputs.is_release == 'true' && steps.npmjs-version.outputs.exists != 'true'
        run: npm publish --access public --provenance --tag "${{ steps.meta.outputs.dist_tag }}"

      - name: Verify npmjs.com public visibility
        if: steps.meta.outputs.is_release == 'true'
        env:
          PACKAGE_NAME: ${{ steps.meta.outputs.name }}
          PACKAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          REGISTRY_PATH="$(node -e "process.stdout.write(encodeURIComponent(process.env.PACKAGE_NAME))")"
          URL="https://registry.npmjs.org/${REGISTRY_PATH}"
          for attempt in {1..12}; do
            if curl -fsS "$URL" | node -e '
              let data = "";
              process.stdin.on("data", (chunk) => { data += chunk; });
              process.stdin.on("end", () => {
                const pkg = JSON.parse(data);
                process.exit(pkg.versions && pkg.versions[process.env.PACKAGE_VERSION] ? 0 : 1);
              });
            '; then
              echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is publicly visible on npmjs.com."
              exit 0
            fi
            echo "npmjs.com visibility check attempt ${attempt}/12 failed; retrying."
            sleep 10
          done
          echo "::error::${PACKAGE_NAME}@${PACKAGE_VERSION} is not publicly visible on npmjs.com after publish."
          exit 1

      - name: Normalize npmjs.com dist-tags
        if: steps.meta.outputs.is_release == 'true'
        env:
          PACKAGE_NAME: ${{ steps.meta.outputs.name }}
          PACKAGE_VERSION: ${{ steps.meta.outputs.version }}
          DIST_TAG: ${{ steps.meta.outputs.dist_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not configured; trusted publishing handled npmjs.com publication, so optional dist-tag normalization is skipped."
            npm dist-tag ls "$PACKAGE_NAME" --registry https://registry.npmjs.org || true
            exit 0
          fi
          npm dist-tag add "${PACKAGE_NAME}@${PACKAGE_VERSION}" "${DIST_TAG}" --registry https://registry.npmjs.org
          if [ "$DIST_TAG" != "latest" ]; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is available through the npmjs.com ${DIST_TAG} dist-tag."
            npm dist-tag add "${PACKAGE_NAME}@${PACKAGE_VERSION}" latest --registry https://registry.npmjs.org
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is also the npmjs.com latest dist-tag because it is the newest published package version."
          fi
          npm dist-tag ls "$PACKAGE_NAME" --registry https://registry.npmjs.org

      - name: Setup Node.js 24 for GitHub Packages
        if: steps.meta.outputs.is_release == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://npm.pkg.github.com"
          scope: "@lcv-ideas-software"

      - name: Check GitHub Packages version
        id: gh-packages-version
        if: steps.meta.outputs.is_release == 'true'
        run: |
          if npm view "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }}" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }} already exists on GitHub Packages; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }} is not published on GitHub Packages yet."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.meta.outputs.is_release == 'true' && steps.gh-packages-version.outputs.exists != 'true'
        run: npm publish --access public --provenance --tag "${{ steps.meta.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release notes from CHANGELOG.md
        id: notes
        if: steps.meta.outputs.is_release == 'true'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          PACKAGE_VERSION: ${{ steps.meta.outputs.version }}
          DISPLAY_TAG: ${{ steps.meta.outputs.display_tag }}
        run: |
          SEMVER_TAG="v${PACKAGE_VERSION}"
          SEMVER_NO_PREFIX="${PACKAGE_VERSION}"
          DISPLAY_NO_PREFIX="${DISPLAY_TAG#v}"
          TAG_NO_PREFIX="${TAG#v}"
          NOTES=$(awk \
            -v tag="$TAG" \
            -v tag_np="$TAG_NO_PREFIX" \
            -v display="$DISPLAY_TAG" \
            -v display_np="$DISPLAY_NO_PREFIX" \
            -v semver="$SEMVER_TAG" \
            -v semver_np="$SEMVER_NO_PREFIX" '
            $0 == "## [" tag "]" || $0 == "## [" tag_np "]" ||
            $0 == "## [" display "]" || $0 == "## [" display_np "]" ||
            $0 == "## [" semver "]" || $0 == "## [" semver_np "]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG. See CHANGELOG.md for details."
          fi
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.meta.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping create."
            exit 0
          fi
          gh release create "$TAG" artifacts/*.tgz \
            --repo "$GITHUB_REPOSITORY" \
            --title "cross-review-v2 $TAG" \
            --notes "$NOTES" \
            --latest
